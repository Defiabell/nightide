<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>夜潮 Nightide — M1 战斗沙盒</title>
    <link rel="icon" href="data:," />
    <style>
      body { margin: 0; background: #06070f; color: #cfd4ea; font-family: system-ui, sans-serif; display: flex; justify-content: center; }
      #app { display: flex; gap: 16px; padding: 16px; align-items: flex-start; }
      /* HUD redesign — two-zone layout (direct user feedback: "菜单和一些信息能不能放在游戏上方，
         所有的选项都放在右侧有点长，而且不好辨认"): `#battle-column` stacks the new `#topbar`
         (glanceable read-only status + the ☰ 菜单 button) directly above `#game`, so the two share
         the same column and the top bar's width can be pinned to the canvas's own pixel width
         (`main.ts` sets `#topbar`'s inline width to `board.cols * CELL`, the same figure it already
         computes for the Phaser `Game`'s own width — see `layout.ts`'s `boardPixelSize`). `#hud`
         (the right column) keeps only the INTERACTIVE controls (cards/abilities/拆除/阵型/设集结点/
         draft) — see hud.ts's constructor doc comment for the full split. */
      #battle-column { display: flex; flex-direction: column; gap: 10px; }
      #game { position: relative; }
      /* Glanceable status strip: gold/兵力/灯辉/等级/剩余时间 + the ☰ 菜单 button, horizontal so
         each readout gets its own labeled slot instead of stacking into one hard-to-scan column.
         `position: relative` is the containing block for `.menu-dropdown`'s absolute placement
         below (opening the dropdown must not reflow/widen the bar). */
      /* `box-sizing: border-box` is load-bearing here: `main.ts` sets this element's inline
         `width` to the canvas's exact pixel width (`boardPixelSize`) so the bar spans the board
         edge-to-edge — with the default `content-box`, that width would exclude this rule's own
         padding/border and the bar would overhang the canvas on both sides. */
      /* HUD redesign v2: two stacked rows — row 1「整体」(buttons + difficulty + 天梯 + timer),
         row 2「战局」(你 vs 对手 live stats). Column layout; each `.topbar-row` is its own flex row. */
      #topbar { box-sizing: border-box; position: relative; display: flex; flex-direction: column; align-items: stretch; gap: 8px; padding: 10px 16px; background: #12101f; border: 1px solid #4a3a7a; border-radius: 8px; }
      #topbar .topbar-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
      /* Row 1 sits above a hairline divider so the「整体」frame reads as distinct from the「战局」
         stats below it. `position: relative` so the ☰ `menu-dropdown` (a child of row 1) anchors its
         `top: 100%` to row 1 alone, opening right under the ☰ button rather than below both rows. */
      #topbar .topbar-row-meta { position: relative; padding-bottom: 8px; border-bottom: 1px solid #2a2350; }
      /* The five status readouts share one flex group so the vertical divider rule below can target
         them without also drawing a line next to the ☰ 菜单 button (a different visual family). */
      /* Row 2「战局」: inherits display:flex/align/wrap from `.topbar-row`; only overrides gap to 0
         because its `> div` children draw their own border-left dividers instead of using gap. */
      #topbar .topbar-stats { gap: 0; }
      #topbar .topbar-stats > div { padding: 0 14px; border-left: 1px solid #2a2350; white-space: nowrap; }
      #topbar .topbar-stats > div:first-child { border-left: none; padding-left: 0; }
      /* Task (the lantern menu) requirement 3: safety net for short viewports — #hud itself
         doesn't need this on a normal-height window (the menu collapsing the four old buttons
         into one is the primary space fix), but if content still exceeds the viewport this lets
         the panel scroll internally instead of overflowing the page. Thin, dark-theme-toned
         scrollbar (both the standard and WebKit-specific properties, for cross-browser coverage). */
      #hud { width: 200px; display: flex; flex-direction: column; gap: 10px; max-height: 100vh; overflow-y: auto; scrollbar-width: thin; scrollbar-color: #4a3a7a #12101f; }
      #hud::-webkit-scrollbar { width: 6px; }
      #hud::-webkit-scrollbar-track { background: #12101f; }
      #hud::-webkit-scrollbar-thumb { background: #4a3a7a; border-radius: 3px; }
      #hud .banner { font-size: 15px; font-weight: 600; line-height: 1.5; padding: 8px; background: #17123a; border: 1px solid #4a3a7a; border-radius: 6px; text-align: center; }
      #hud .memory-row { font-size: 12px; line-height: 1.6; padding: 6px 8px; background: #1a1030; border: 1px solid #4a3a7a; border-radius: 6px; text-align: center; color: #cdadff; }
      #hud .memory-row .archetype-reveal { color: #9aa3c9; font-size: 11px; margin-top: 2px; }
      /* HUD redesign: gold/兵力/灯辉/等级/剩余时间 now render inside `#topbar` (see above), not
         `#hud` — these five selectors are scoped to their new parent below. `#hud .cards-row`
         stays (the card bar remains the tallest thing in the leaner right column). */
      #topbar .gold-row { font-size: 13px; color: #d8a03c; }
      /* 多资源经济 R6 (client material readouts, docs/plans/nightide/2026-07-22-multi-resource-
         economy-plan.md §6): YOUR wood/ore only — see `materialsRow`'s own doc comment in hud.ts.
         Wood-green/ore-slate tones, matching `effects.ts`'s existing `harvested` fx float-text
         colors (0x9ecb7e / 0xbfc7d6) so the readout and the harvest fx read as the same resource. */
      #topbar .materials-row { font-size: 13px; }
      #topbar .materials-row .material-wood { color: #9ecb7e; }
      #topbar .materials-row .material-ore { color: #bfc7d6; }
      /* V4f-3 (frontier client): unit-count/cap readout — same tier as .gold-row, distinct hue so
         it doesn't read as "more gold info". `.at-cap` flags when the LOCAL player has hit
         maxUnitsPerFaction (production silently paused) — warm/red like the building panel's own
         拆除 button palette below, so it reads as "attention", not just informational. */
      #topbar .units-row { font-size: 13px; color: #9fd3ff; }
      #topbar .units-row.at-cap { color: #ff8a8a; font-weight: 600; }
      #topbar .progress-row { font-size: 12px; color: #9aa3c9; letter-spacing: 1px; }
      #topbar .timer-row { font-size: 12px; color: #9aa3c9; letter-spacing: 0.5px; }
      #hud .cards-row { display: flex; flex-direction: column; gap: 8px; }
      #hud button { padding: 8px; background: #141a33; color: #cfd4ea; border: 1px solid #2a3155; border-radius: 6px; cursor: pointer; text-align: left; font-size: 13px; }
      #hud button:disabled { opacity: 0.35; cursor: default; }
      #hud button.selected { border-color: #d8a03c; color: #d8a03c; }
      #hud button.shake { animation: card-shake 0.3s ease-in-out; }
      #hud .rematch-btn { font-size: 15px; font-weight: 600; text-align: center; padding: 10px; background: #3a2a6a; color: #e8dcff; border: 1px solid #7a5ad8; border-radius: 6px; cursor: pointer; }
      #hud .rematch-btn:hover { background: #4a3585; }
      #hud .draft-panel { display: flex; flex-direction: column; gap: 6px; background: #17123a; border: 1px solid #4a3a7a; border-radius: 6px; padding: 8px; }
      #hud .draft-options { display: flex; gap: 6px; }
      #hud .draft-options button { flex: 1; font-size: 12px; padding: 6px; text-align: center; }
      #hud .draft-bar-track { height: 4px; background: #241a3a; border-radius: 2px; overflow: hidden; }
      #hud .draft-bar-fill { height: 100%; width: 100%; background: #d8a03c; transition: width 0.05s linear; }
      #hud .toast { color: #ffcf6e; font-size: 12px; background: #241a3a; border: 1px solid #4a3a7a; border-radius: 4px; padding: 4px 8px; align-self: flex-start; animation: toast-float 1.4s ease-out forwards; }
      #hud .toast.tide-toast { color: #ff8a8a; background: #2a1414; border-color: #7a3a3a; }
      /* 多资源经济 R6 (client building panel, plan §6): REPLACES the old standalone 「拆除」toggle
         button — same dark-card treatment as `.draft-panel` (both are event-driven popups at the
         top of `#hud`). 升级 reuses the warm gold family (`.rally-pick-btn.active`'s hue); 拆除
         reuses the old `.demolish-btn`'s red family; 取消 is a plain neutral button. */
      #hud .building-panel { display: flex; flex-direction: column; gap: 6px; background: #17123a; border: 1px solid #4a3a7a; border-radius: 6px; padding: 8px; }
      #hud .building-panel-title { font-size: 14px; font-weight: 600; color: #ffcf6e; text-align: center; }
      #hud .building-panel-note { font-size: 12px; color: #9aa3c9; text-align: center; }
      #hud .building-panel-upgrade-btn { padding: 8px; background: #3a2e14; color: #ffcf6e; border: 1px solid #7a5a24; border-radius: 6px; cursor: pointer; font-size: 13px; text-align: center; }
      #hud .building-panel-upgrade-btn:hover { background: #4a3a1c; }
      #hud .building-panel-upgrade-btn:disabled { opacity: 0.35; cursor: default; }
      #hud .building-panel-demolish-btn { padding: 8px; background: #3a1a1a; color: #ffb3b3; border: 1px solid #7a3a3a; border-radius: 6px; cursor: pointer; font-size: 13px; text-align: center; }
      #hud .building-panel-demolish-btn:hover { background: #4a2222; }
      #hud .building-panel-demolish-btn:disabled { opacity: 0.35; cursor: default; }
      #hud .building-panel-cancel-btn { padding: 6px; background: #201a3a; color: #9aa3c9; border: 1px solid #3a3a5a; border-radius: 6px; cursor: pointer; font-size: 12px; text-align: center; }
      #hud .building-panel-cancel-btn:hover { background: #2a2248; }
      #topbar .pause-btn { padding: 8px; background: #16223a; color: #9fd3ff; border: 1px solid #345a82; border-radius: 6px; cursor: pointer; font-size: 13px; text-align: center; }
      #topbar .pause-btn:hover { background: #1e2f4d; }
      #topbar .pause-btn.active { background: #2a4a6e; color: #fff; border-color: #6ab3ff; }
      #topbar .pause-btn:disabled { opacity: 0.35; cursor: default; }
      /* HUD redesign: the ☰ 菜单 button moved from `#hud` into `#topbar` (same horizontal strip as
         the status readouts, per direct user feedback) — same dark-panel family as .history-btn,
         `.active` echoes the dropdown's open state the way `.pause-btn.active`/`.rally-pick-btn.active`
         echo their own toggles. `flex-shrink: 0` keeps it from being squeezed by the stats group
         when the bar wraps on a narrower viewport. */
      #topbar .menu-btn { flex-shrink: 0; padding: 8px 12px; background: #201a3a; color: #cdadff; border: 1px solid #4a3a7a; border-radius: 6px; cursor: pointer; font-size: 13px; text-align: center; font-weight: 600; letter-spacing: 0.5px; }
      #topbar .menu-btn:hover { background: #2a2248; }
      #topbar .menu-btn.active { background: #2e2350; border-color: #7a5ad8; color: #e8dcff; }
      /* Collapsed by default (JS sets display: none); a small panel once opened, matching
         .draft-panel's dark-card treatment so the four re-housed buttons read as one group.
         HUD redesign: now absolutely positioned under the ☰ button (`#topbar` is its containing
         block, set above) instead of flowing inline — opening it must not push the status
         readouts sideways or wrap the bar. `z-index` is an explicit integer (not `auto`) so it
         reliably paints above `#game`, which is also `position: relative` — two z-index:auto
         positioned boxes would otherwise stack by DOM order, and `#game` comes later in the
         document than `#topbar`. */
      #topbar .menu-dropdown { position: absolute; top: calc(100% + 6px); left: 0; z-index: 22; min-width: 190px; flex-direction: column; gap: 8px; background: #17123a; border: 1px solid #4a3a7a; border-radius: 6px; padding: 8px; box-shadow: 0 8px 24px rgba(0, 0, 0, 0.45); }
      /* M2d Task (重新开始): always-visible reset button, sits right beside 暂停. */
      #topbar .restart-btn { padding: 8px; background: #223016; color: #b9e8a0; border: 1px solid #4a7a34; border-radius: 6px; cursor: pointer; font-size: 13px; text-align: center; }
      #topbar .restart-btn:hover { background: #2b3d1c; }
      /* M2d Task (投降与托管): opens the 3-option surrender dialog. */
      #topbar .surrender-btn { padding: 8px; background: #3a1a1a; color: #ffb3b3; border: 1px solid #7a3a3a; border-radius: 6px; cursor: pointer; font-size: 13px; text-align: center; }
      #topbar .surrender-btn:hover { background: #4a2222; }
      #topbar .surrender-btn:disabled { opacity: 0.35; cursor: default; }
      /* M2d Task (战史): opens the match-history overlay panel. */
      #topbar .history-btn { padding: 8px; background: #201a3a; color: #cdadff; border: 1px solid #4a3a7a; border-radius: 6px; cursor: pointer; font-size: 13px; text-align: center; }
      #topbar .history-btn:hover { background: #2a2248; }
      /* B2 (client difficulty UI): the ☰ 菜单's 「难度」row — one compact row, three cycling
         buttons (简单/普通/困难) + a hint that only appears once the selection diverges from the
         running match's own tier ("下一局生效"). HUD redesign: lives inside `.menu-dropdown`,
         which moved from `#hud` into `#topbar` — selector scope follows. */
      #topbar .difficulty-row { display: flex; align-items: center; flex-wrap: wrap; gap: 4px; }
      #topbar .difficulty-label { color: #9aa3c9; font-size: 12px; margin-right: 2px; }
      #topbar .difficulty-btn { flex: 1; padding: 5px 4px; font-size: 12px; text-align: center; background: #201a3a; color: #9aa3c9; border: 1px solid #3a3a5a; border-radius: 6px; }
      #topbar .difficulty-btn:hover { background: #2a2248; }
      #topbar .difficulty-btn.active { background: #2e2350; border-color: #7a5ad8; color: #e8dcff; }
      #topbar .difficulty-hint { flex-basis: 100%; display: none; color: #ffd76e; font-size: 11px; text-align: center; }
      /* Difficulty visibility fix: the always-on top-bar badge showing THIS match's tier. Sits
         between the ☰ button and the stats group. Tier-colored so 困难 vs 普通 is glanceable at a
         distance (green=简单, neutral=普通, red-orange=困难); `.pending` (a queued next-match switch)
         adds a dashed outline + the muted "下局→X" note. */
      #topbar .topbar-difficulty { flex-shrink: 0; display: flex; align-items: center; gap: 6px; padding: 6px 10px; border-radius: 6px; font-size: 12px; color: #9aa3c9; border: 1px solid transparent; }
      #topbar .topbar-difficulty b { font-size: 13px; font-weight: 600; }
      #topbar .topbar-difficulty.tier-easy { background: #16240f; color: #9ecb7e; border-color: #3a5a28; }
      #topbar .topbar-difficulty.tier-easy b { color: #c3e8a8; }
      #topbar .topbar-difficulty.tier-normal { background: #17182c; color: #9aa3c9; border-color: #34365a; }
      #topbar .topbar-difficulty.tier-normal b { color: #cfd4ea; }
      #topbar .topbar-difficulty.tier-hard { background: #2c1410; color: #ffab8a; border-color: #7a3a2a; }
      #topbar .topbar-difficulty.tier-hard b { color: #ffcbb3; }
      #topbar .topbar-difficulty.pending { border-style: dashed; border-color: #ffd76e; }
      #topbar .topbar-difficulty .pending-note { color: #ffd76e; font-size: 11px; }
      /* V4f-10 L2 (light command client, docs/plans/nightide/2026-07-21-light-command-design.md
         §3): 阵型 (stance) row — 集结/进攻/防守, same pill-button family as .difficulty-row above
         but placed near the top (goldRow tier, not tucked in ☰ 菜单) since a stance change is a
         mid-match action the player reaches for often, unlike difficulty (next-match only). No
         `.active` state is ever set from a click here — it's a pure read of the running match's
         `state.command[0].stance` (see `hud.ts`'s `stanceButtons` doc comment). */
      #hud .stance-row { display: flex; align-items: center; flex-wrap: wrap; gap: 4px; }
      #hud .stance-label { color: #9aa3c9; font-size: 12px; margin-right: 2px; }
      #hud .stance-btn { flex: 1; padding: 5px 4px; font-size: 12px; text-align: center; background: #201a3a; color: #9aa3c9; border: 1px solid #3a3a5a; border-radius: 6px; }
      #hud .stance-btn:hover { background: #2a2248; }
      #hud .stance-btn.active { background: #2e2350; border-color: #7a5ad8; color: #e8dcff; }
      #hud .stance-btn:disabled { opacity: 0.35; cursor: default; }
      /* 「设集结点」 toggle — same placement-mode family as the building panel's own buttons, but its own warm
         gold/amber hue matching the on-board rally flag (`RALLY_FLAG_COLOR` in BattleScene.ts, the
         same hue as `.gold-row`/`OWN_HALF_TINT[0]`), so the button and the flag it controls read
         as the same feature. */
      #hud .rally-pick-btn { padding: 8px; background: #3a2e14; color: #ffcf6e; border: 1px solid #7a5a24; border-radius: 6px; cursor: pointer; font-size: 13px; text-align: center; }
      #hud .rally-pick-btn:hover { background: #4a3a1c; }
      #hud .rally-pick-btn.active { background: #d8a03c; color: #1a1406; border-color: #ffd76e; }
      #hud .rally-pick-btn:disabled { opacity: 0.35; cursor: default; }
      /* Cursor hint while picking a rally cell — mirrors #game.ability-targeting's own rule. */
      #game.rally-picking canvas { cursor: crosshair; }
      /* M2d Task (天梯): "守夜人 1063" style rating readout + match-end delta line. HUD redesign v2:
         the persistent rating readout moved to topbar row 1「整体」; the match-end delta stays in `#hud`. */
      #topbar .ladder-row { font-size: 13px; color: #ffd76e; font-weight: 600; letter-spacing: 0.5px; white-space: nowrap; }
      #hud .ladder-delta-row { font-size: 13px; font-weight: 600; padding: 4px 8px; border-radius: 6px; text-align: center; }
      #hud .ladder-delta-row.positive { color: #7ce0a0; background: #16281c; }
      #hud .ladder-delta-row.negative { color: #ff8a8a; background: #2a1414; }
      /* M2d Task (托管): "守灯人代打中…" badge, shown while the steward is in control. */
      #hud .takeover-badge { font-size: 12px; color: #ffd76e; background: #2a2210; border: 1px solid #7a6a34; border-radius: 6px; padding: 5px 8px; text-align: center; }
      /* V2e hero abilities (M2e-3 client): 灯辉 energy bar — a glowing worldview-toned meter. HUD
         redesign v2 (user feedback: put 灯辉 next to the abilities): moved out of `#topbar` to the
         bottom of `#hud`, directly above the ability bar, so the player watches the meter fill right
         where the cast buttons are. Fills the full 200px `#hud` column (`flex: 1` track). */
      #hud .lamplight-row { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #ffd76e; }
      #hud .lamplight-label { flex-shrink: 0; font-weight: 600; letter-spacing: 1px; }
      #hud .lamplight-track { flex: 1; height: 8px; background: #241a08; border: 1px solid #7a6a34; border-radius: 4px; overflow: hidden; }
      #hud .lamplight-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #d8a03c, #ffe38a); box-shadow: 0 0 8px rgba(255, 215, 110, 0.75); transition: width 0.15s linear; }
      #hud .lamplight-value { flex-shrink: 0; font-variant-numeric: tabular-nums; color: #cfd4ea; }
      /* V2e hero abilities (M2e-3 client): the hero ability bar — a distinct glowing "ready" state
         once affordable (lamplight[0] >= cost), dimmed otherwise; `.targeting` marks the ability
         currently awaiting a board click. */
      #hud .abilities-row { display: flex; flex-direction: column; gap: 6px; }
      #hud .ability-btn { padding: 8px; background: #201a3a; color: #7a7fa0; border: 1px solid #3a3a5a; border-radius: 6px; cursor: pointer; font-size: 13px; text-align: left; opacity: 0.55; }
      #hud .ability-btn.ready { opacity: 1; color: #ffd76e; border-color: #ffd76e; box-shadow: 0 0 8px rgba(255, 215, 110, 0.5); }
      #hud .ability-btn.ready:hover { background: #2a2248; }
      #hud .ability-btn.targeting { border-color: #ffe38a; border-style: dashed; color: #ffe38a; background: #2e2a12; }
      #hud .ability-btn:disabled { opacity: 0.3; cursor: default; box-shadow: none; }
      #hud .ability-btn.shake { animation: card-shake 0.3s ease-in-out; }
      /* V2e hero abilities (M2e-3 client): cursor hint while a target-required ability awaits its
         placement cell — mirrors the pattern the pause overlay already established for #game. */
      #game.ability-targeting canvas { cursor: crosshair; }
      #nightide-tooltip { position: fixed; z-index: 1000; pointer-events: none; background: #17123a; border: 1px solid #4a3a7a; border-radius: 6px; padding: 8px 10px; font-size: 12px; line-height: 1.6; color: #cfd4ea; max-width: 260px; box-shadow: 0 4px 14px rgba(0, 0, 0, 0.4); }
      #nightide-tooltip .tt-title { font-weight: 600; color: #ffcf6e; margin-bottom: 2px; }
      #nightide-tooltip .tt-desc { color: #9aa3c9; margin-bottom: 4px; }
      #nightide-tooltip .tt-hint { color: #7ce0a0; margin-top: 4px; }
      #nightide-tooltip .tt-upgrade-title { color: #d8a03c; margin-top: 6px; font-weight: 600; }
      @keyframes card-shake {
        10%, 90% { transform: translateX(-2px); }
        20%, 80% { transform: translateX(3px); }
        30%, 50%, 70% { transform: translateX(-5px); }
        40%, 60% { transform: translateX(5px); }
      }
      @keyframes toast-float {
        from { opacity: 1; transform: translateY(0); }
        to { opacity: 0; transform: translateY(-18px); }
      }
      /* M2c 潮汐警报 / V4g-E3 (night-tide event banners): a single shared banner overlaid on the
         battlefield (#game) for BOTH tideWarning ("夜潮将至！") and the 3 nightEvent kinds — see
         ui/tideAlert.ts's TideAlert + nightEventBanner.ts's copy/class lookup. Color/text-shadow
         live on the per-kind `.kind-*` class (not this base rule) so each event reads distinctly;
         fade-in/out timing/shape is shared via the same `tide-banner-fade` animation. */
      #nightide-tide-banner { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 34px; font-weight: 800; letter-spacing: 3px; pointer-events: none; opacity: 0; z-index: 15; white-space: nowrap; }
      #nightide-tide-banner.tide-banner-show { animation: tide-banner-fade 2s ease-in-out; }
      /* tideWarning: the pre-existing dark-red treatment, unchanged. */
      #nightide-tide-banner.kind-tideWarning { color: #ff3344; text-shadow: 0 0 18px rgba(255, 51, 68, 0.85), 0 2px 4px #1a0006; }
      /* beastSurge: cool cyan-blue, echoing WILD_TINT (BattleScene.ts) — "the tide itself surges". */
      #nightide-tide-banner.kind-beastSurge { color: #35c9ff; text-shadow: 0 0 18px rgba(53, 201, 255, 0.85), 0 2px 4px #04121a; }
      /* quake: earthy fire-orange, echoing the forest-fire sweep fx's palette (effects.ts) — "the
         ground itself is splitting". */
      #nightide-tide-banner.kind-quake { color: #ff8a3d; text-shadow: 0 0 18px rgba(255, 138, 61, 0.85), 0 2px 4px #1a0e04; }
