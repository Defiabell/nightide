<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>夜潮 Nightide — M1 战斗沙盒</title>
    <link rel="icon" href="data:," />
    <style>
      body { margin: 0; background: #06070f; color: #cfd4ea; font-family: system-ui, sans-serif; display: flex; justify-content: center; }
      #app { display: flex; gap: 16px; padding: 16px; align-items: flex-start; }
      #game { position: relative; }
      /* Task (the lantern menu) requirement 3: safety net for short viewports — #hud itself
         doesn't need this on a normal-height window (the menu collapsing the four old buttons
         into one is the primary space fix), but if content still exceeds the viewport this lets
         the panel scroll internally instead of overflowing the page. Thin, dark-theme-toned
         scrollbar (both the standard and WebKit-specific properties, for cross-browser coverage). */
      #hud { width: 200px; display: flex; flex-direction: column; gap: 10px; max-height: 100vh; overflow-y: auto; scrollbar-width: thin; scrollbar-color: #4a3a7a #12101f; }
      #hud::-webkit-scrollbar { width: 6px; }
      #hud::-webkit-scrollbar-track { background: #12101f; }
      #hud::-webkit-scrollbar-thumb { background: #4a3a7a; border-radius: 3px; }
      #hud .banner { font-size: 15px; font-weight: 600; line-height: 1.5; padding: 8px; background: #17123a; border: 1px solid #4a3a7a; border-radius: 6px; text-align: center; }
      #hud .memory-row { font-size: 12px; line-height: 1.6; padding: 6px 8px; background: #1a1030; border: 1px solid #4a3a7a; border-radius: 6px; text-align: center; color: #cdadff; }
      #hud .memory-row .archetype-reveal { color: #9aa3c9; font-size: 11px; margin-top: 2px; }
      #hud .gold-row { font-size: 13px; color: #d8a03c; }
      /* V4f-3 (frontier client): unit-count/cap readout — same tier as .gold-row, distinct hue so
         it doesn't read as "more gold info". `.at-cap` flags when the LOCAL player has hit
         maxUnitsPerFaction (production silently paused) — warm/red like the demolish-btn palette,
         so it reads as "attention", not just informational. */
      #hud .units-row { font-size: 13px; color: #9fd3ff; }
      #hud .units-row.at-cap { color: #ff8a8a; font-weight: 600; }
      #hud .progress-row { font-size: 12px; color: #9aa3c9; letter-spacing: 1px; }
      #hud .timer-row { font-size: 12px; color: #9aa3c9; letter-spacing: 0.5px; }
      #hud .cards-row { display: flex; flex-direction: column; gap: 8px; }
      #hud button { padding: 8px; background: #141a33; color: #cfd4ea; border: 1px solid #2a3155; border-radius: 6px; cursor: pointer; text-align: left; font-size: 13px; }
      #hud button:disabled { opacity: 0.35; cursor: default; }
      #hud button.selected { border-color: #d8a03c; color: #d8a03c; }
      #hud button.shake { animation: card-shake 0.3s ease-in-out; }
      #hud .rematch-btn { font-size: 15px; font-weight: 600; text-align: center; padding: 10px; background: #3a2a6a; color: #e8dcff; border: 1px solid #7a5ad8; border-radius: 6px; cursor: pointer; }
      #hud .rematch-btn:hover { background: #4a3585; }
      #hud .draft-panel { display: flex; flex-direction: column; gap: 6px; background: #17123a; border: 1px solid #4a3a7a; border-radius: 6px; padding: 8px; }
      #hud .draft-options { display: flex; gap: 6px; }
      #hud .draft-options button { flex: 1; font-size: 12px; padding: 6px; text-align: center; }
      #hud .draft-bar-track { height: 4px; background: #241a3a; border-radius: 2px; overflow: hidden; }
      #hud .draft-bar-fill { height: 100%; width: 100%; background: #d8a03c; transition: width 0.05s linear; }
      #hud .toast { color: #ffcf6e; font-size: 12px; background: #241a3a; border: 1px solid #4a3a7a; border-radius: 4px; padding: 4px 8px; align-self: flex-start; animation: toast-float 1.4s ease-out forwards; }
      #hud .toast.tide-toast { color: #ff8a8a; background: #2a1414; border-color: #7a3a3a; }
      #hud .demolish-btn { padding: 8px; background: #3a1a1a; color: #ffb3b3; border: 1px solid #7a3a3a; border-radius: 6px; cursor: pointer; font-size: 13px; text-align: center; }
      #hud .demolish-btn:hover { background: #4a2222; }
      #hud .demolish-btn.active { background: #ff3344; color: #fff; border-color: #ff8899; }
      #hud .demolish-btn:disabled { opacity: 0.35; cursor: default; }
      #hud .pause-btn { padding: 8px; background: #16223a; color: #9fd3ff; border: 1px solid #345a82; border-radius: 6px; cursor: pointer; font-size: 13px; text-align: center; }
      #hud .pause-btn:hover { background: #1e2f4d; }
      #hud .pause-btn.active { background: #2a4a6e; color: #fff; border-color: #6ab3ff; }
      #hud .pause-btn:disabled { opacity: 0.35; cursor: default; }
      /* Task (the lantern menu): the ☰ 菜单 button replacing the four standalone rows that used
         to overflow #hud — same dark-panel family as .history-btn, `.active` echoes the dropdown's
         open state the way `.pause-btn.active`/`.demolish-btn.active` echo their own toggles. */
      #hud .menu-btn { padding: 8px; background: #201a3a; color: #cdadff; border: 1px solid #4a3a7a; border-radius: 6px; cursor: pointer; font-size: 13px; text-align: center; font-weight: 600; letter-spacing: 0.5px; }
      #hud .menu-btn:hover { background: #2a2248; }
      #hud .menu-btn.active { background: #2e2350; border-color: #7a5ad8; color: #e8dcff; }
      /* Collapsed by default (JS sets display: none); a small panel once opened, matching
         .draft-panel's dark-card treatment so the four re-housed buttons read as one group. */
      #hud .menu-dropdown { flex-direction: column; gap: 8px; background: #17123a; border: 1px solid #4a3a7a; border-radius: 6px; padding: 8px; }
      /* M2d Task (重新开始): always-visible reset button, sits right beside 暂停. */
      #hud .restart-btn { padding: 8px; background: #223016; color: #b9e8a0; border: 1px solid #4a7a34; border-radius: 6px; cursor: pointer; font-size: 13px; text-align: center; }
      #hud .restart-btn:hover { background: #2b3d1c; }
      /* M2d Task (投降与托管): opens the 3-option surrender dialog. */
      #hud .surrender-btn { padding: 8px; background: #3a1a1a; color: #ffb3b3; border: 1px solid #7a3a3a; border-radius: 6px; cursor: pointer; font-size: 13px; text-align: center; }
      #hud .surrender-btn:hover { background: #4a2222; }
      #hud .surrender-btn:disabled { opacity: 0.35; cursor: default; }
      /* M2d Task (战史): opens the match-history overlay panel. */
      #hud .history-btn { padding: 8px; background: #201a3a; color: #cdadff; border: 1px solid #4a3a7a; border-radius: 6px; cursor: pointer; font-size: 13px; text-align: center; }
      #hud .history-btn:hover { background: #2a2248; }
      /* B2 (client difficulty UI): the ☰ 菜单's 「难度」row — one compact row, three cycling
         buttons (简单/普通/困难) + a hint that only appears once the selection diverges from the
         running match's own tier ("下一局生效"). */
      #hud .difficulty-row { display: flex; align-items: center; flex-wrap: wrap; gap: 4px; }
      #hud .difficulty-label { color: #9aa3c9; font-size: 12px; margin-right: 2px; }
      #hud .difficulty-btn { flex: 1; padding: 5px 4px; font-size: 12px; text-align: center; background: #201a3a; color: #9aa3c9; border: 1px solid #3a3a5a; border-radius: 6px; }
      #hud .difficulty-btn:hover { background: #2a2248; }
      #hud .difficulty-btn.active { background: #2e2350; border-color: #7a5ad8; color: #e8dcff; }
      #hud .difficulty-hint { flex-basis: 100%; display: none; color: #ffd76e; font-size: 11px; text-align: center; }
      /* M2d Task (天梯): "守夜人 1063" style rating readout + match-end delta line. */
      #hud .ladder-row { font-size: 13px; color: #ffd76e; font-weight: 600; letter-spacing: 0.5px; }
      #hud .ladder-delta-row { font-size: 13px; font-weight: 600; padding: 4px 8px; border-radius: 6px; text-align: center; }
      #hud .ladder-delta-row.positive { color: #7ce0a0; background: #16281c; }
      #hud .ladder-delta-row.negative { color: #ff8a8a; background: #2a1414; }
      /* M2d Task (托管): "守灯人代打中…" badge, shown while the steward is in control. */
      #hud .takeover-badge { font-size: 12px; color: #ffd76e; background: #2a2210; border: 1px solid #7a6a34; border-radius: 6px; padding: 5px 8px; text-align: center; }
      /* V2e hero abilities (M2e-3 client): 灯辉 energy bar — a glowing worldview-toned meter,
         distinct from the plain progress-row/timer-row text rows. */
      #hud .lamplight-row { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #ffd76e; }
      #hud .lamplight-label { flex-shrink: 0; font-weight: 600; letter-spacing: 1px; }
      #hud .lamplight-track { flex: 1; height: 8px; background: #241a08; border: 1px solid #7a6a34; border-radius: 4px; overflow: hidden; }
      #hud .lamplight-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #d8a03c, #ffe38a); box-shadow: 0 0 8px rgba(255, 215, 110, 0.75); transition: width 0.15s linear; }
      #hud .lamplight-value { flex-shrink: 0; font-variant-numeric: tabular-nums; color: #cfd4ea; }
      /* V2e hero abilities (M2e-3 client): the hero ability bar — a distinct glowing "ready" state
         once affordable (lamplight[0] >= cost), dimmed otherwise; `.targeting` marks the ability
         currently awaiting a board click. */
      #hud .abilities-row { display: flex; flex-direction: column; gap: 6px; }
      #hud .ability-btn { padding: 8px; background: #201a3a; color: #7a7fa0; border: 1px solid #3a3a5a; border-radius: 6px; cursor: pointer; font-size: 13px; text-align: left; opacity: 0.55; }
      #hud .ability-btn.ready { opacity: 1; color: #ffd76e; border-color: #ffd76e; box-shadow: 0 0 8px rgba(255, 215, 110, 0.5); }
      #hud .ability-btn.ready:hover { background: #2a2248; }
      #hud .ability-btn.targeting { border-color: #ffe38a; border-style: dashed; color: #ffe38a; background: #2e2a12; }
      #hud .ability-btn:disabled { opacity: 0.3; cursor: default; box-shadow: none; }
      #hud .ability-btn.shake { animation: card-shake 0.3s ease-in-out; }
      /* V2e hero abilities (M2e-3 client): cursor hint while a target-required ability awaits its
         placement cell — mirrors the pattern the pause overlay already established for #game. */
      #game.ability-targeting canvas { cursor: crosshair; }
      #nightide-tooltip { position: fixed; z-index: 1000; pointer-events: none; background: #17123a; border: 1px solid #4a3a7a; border-radius: 6px; padding: 8px 10px; font-size: 12px; line-height: 1.6; color: #cfd4ea; max-width: 260px; box-shadow: 0 4px 14px rgba(0, 0, 0, 0.4); }
      #nightide-tooltip .tt-title { font-weight: 600; color: #ffcf6e; margin-bottom: 2px; }
      #nightide-tooltip .tt-desc { color: #9aa3c9; margin-bottom: 4px; }
      #nightide-tooltip .tt-hint { color: #7ce0a0; margin-top: 4px; }
      #nightide-tooltip .tt-upgrade-title { color: #d8a03c; margin-top: 6px; font-weight: 600; }
      @keyframes card-shake {
        10%, 90% { transform: translateX(-2px); }
        20%, 80% { transform: translateX(3px); }
        30%, 50%, 70% { transform: translateX(-5px); }
        40%, 60% { transform: translateX(5px); }
      }
      @keyframes toast-float {
        from { opacity: 1; transform: translateY(0); }
        to { opacity: 0; transform: translateY(-18px); }
      }
      /* M2c 潮汐警报: dramatic "夜潮将至！" banner overlaid on the battlefield (#game), shown on
         tideWarning — see ui/tideAlert.ts's TideAlert. Dark-red, fades in/out over ~2s. */
      #nightide-tide-banner { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 34px; font-weight: 800; letter-spacing: 3px; color: #ff3344; text-shadow: 0 0 18px rgba(255, 51, 68, 0.85), 0 2px 4px #1a0006; pointer-events: none; opacity: 0; z-index: 15; white-space: nowrap; }
      #nightide-tide-banner.tide-banner-show { animation: tide-banner-fade 2s ease-in-out; }
      @keyframes tide-banner-fade {
        0% { opacity: 0; transform: translate(-50%, -62%); }
        15% { opacity: 1; transform: translate(-50%, -50%); }
        80% { opacity: 1; transform: translate(-50%, -50%); }
        100% { opacity: 0; transform: translate(-50%, -44%); }
      }
      /* Pause overlay (single-player pause feature — see ui/pauseOverlay.ts): subtle dark overlay
         over the battlefield while paused. `pointer-events: none` is load-bearing — the canvas's
         own hover tooltip must keep working THROUGH this overlay while paused (task brief:
         "inspecting the battlefield while paused is a feature with the codex"). */
      #nightide-pause-overlay { position: absolute; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center; background: rgba(6, 7, 15, 0.55); pointer-events: none; z-index: 16; text-align: center; }
      #nightide-pause-overlay.show { display: flex; }
      #nightide-pause-overlay .pause-title { font-size: 30px; font-weight: 800; letter-spacing: 4px; color: #dfe4f7; text-shadow: 0 0 14px rgba(159, 211, 255, 0.5), 0 2px 4px #000; }
      #nightide-pause-overlay .pause-subtitle { margin-top: 8px; font-size: 13px; color: #8a93b9; letter-spacing: 1px; }
      /* Brief CSS shake on the #game WRAPPER only (render-only, never the Phaser canvas's own
         transform — see ui/tideAlert.ts's doc comment). */
      #game.tide-shake { animation: tide-wrapper-shake 0.4s ease-in-out; }
      @keyframes tide-wrapper-shake {
        10%, 90% { transform: translateX(-3px); }
        20%, 80% { transform: translateX(4px); }
        30%, 50%, 70% { transform: translateX(-7px); }
        40%, 60% { transform: translateX(7px); }
      }
      /* M2d Task (投降与托管): the 3-option surrender modal (see ui/surrenderDialog.ts) — overlaid
         on #game, clickable (unlike the pause overlay, this one is NOT pointer-events: none). */
      #nightide-surrender-dialog { position: absolute; inset: 0; display: none; align-items: center; justify-content: center; background: rgba(6, 7, 15, 0.7); z-index: 20; }
      #nightide-surrender-dialog.show { display: flex; }
      #nightide-surrender-dialog .surrender-box { display: flex; flex-direction: column; gap: 8px; background: #17123a; border: 1px solid #4a3a7a; border-radius: 8px; padding: 18px 22px; min-width: 220px; box-shadow: 0 8px 28px rgba(0, 0, 0, 0.5); }
      #nightide-surrender-dialog .surrender-title { font-size: 18px; font-weight: 700; color: #dfe4f7; text-align: center; margin-bottom: 6px; }
      #nightide-surrender-dialog .surrender-opt { padding: 9px; background: #241a3a; color: #cfd4ea; border: 1px solid #4a3a7a; border-radius: 6px; cursor: pointer; font-size: 13px; }
      #nightide-surrender-dialog .surrender-opt:hover { background: #2e2350; }
      #nightide-surrender-dialog .surrender-concede { color: #ffb3b3; border-color: #7a3a3a; }
      #nightide-surrender-dialog .surrender-cancel { color: #9aa3c9; }
      /* M2d Task (战史): the match-history overlay panel (see ui/historyPanel.ts) — attached to
         <body>, covers the whole page (not just #game). */
      #nightide-history-panel { position: fixed; inset: 0; display: none; align-items: center; justify-content: center; background: rgba(6, 7, 15, 0.75); z-index: 30; }
      #nightide-history-panel.show { display: flex; }
      #nightide-history-panel .history-box { display: flex; flex-direction: column; gap: 10px; background: #12101f; border: 1px solid #4a3a7a; border-radius: 8px; padding: 16px 20px; width: min(640px, 92vw); max-height: 80vh; box-shadow: 0 10px 32px rgba(0, 0, 0, 0.55); }
      #nightide-history-panel .history-header { display: flex; align-items: center; justify-content: space-between; font-size: 18px; font-weight: 700; color: #ffcf6e; }
      #nightide-history-panel .history-close { padding: 6px 12px; background: #241a3a; color: #cfd4ea; border: 1px solid #4a3a7a; border-radius: 6px; cursor: pointer; font-size: 13px; }
      #nightide-history-panel .history-close:hover { background: #2e2350; }
      #nightide-history-panel .history-list { display: flex; flex-direction: column; gap: 4px; overflow-y: auto; }
      #nightide-history-panel .history-empty { padding: 24px; text-align: center; color: #6b7396; font-size: 14px; }
      #nightide-history-panel .history-row { display: grid; grid-template-columns: 78px 24px 1fr 40px 52px 46px 56px 1fr; gap: 8px; align-items: center; padding: 6px 8px; background: #191530; border-radius: 6px; font-size: 12px; color: #cfd4ea; }
      #nightide-history-panel .history-date { color: #8a93b9; }
      #nightide-history-panel .history-result { font-weight: 700; text-align: center; }
      #nightide-history-panel .history-result-win .history-result { color: #7ce0a0; }
      #nightide-history-panel .history-result-loss .history-result { color: #ff8a8a; }
      #nightide-history-panel .history-result-draw .history-result { color: #9aa3c9; }
      /* B2 (client difficulty UI): per-row difficulty tag (简单/普通/困难/— for pre-B2 entries with
         no recorded tier — see `historyStore.ts`'s `HistoryEntry.difficulty` doc comment). */
      #nightide-history-panel .history-difficulty { text-align: center; font-weight: 600; }
      #nightide-history-panel .history-difficulty-easy { color: #7ce0a0; }
      #nightide-history-panel .history-difficulty-normal { color: #9fd3ff; }
      #nightide-history-panel .history-difficulty-hard { color: #ff8a8a; }
      #nightide-history-panel .history-difficulty-none { color: #6b7396; }
      #nightide-history-panel .history-delta { text-align: right; }
      #nightide-history-panel .history-badges { color: #ffd76e; font-size: 11px; text-align: right; }
    </style>
    <script type="module" crossorigin src="./assets/index-DazWzvJL.js"></script>
  </head>
  <body>
    <div id="app">
      <div id="game"></div>
      <div id="hud"></div>
    </div>
  </body>
</html>
